name: Continuous Integration

# Trigger this workflow on pushes or Pull Requests to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the virtual environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: "3.11"
          cache: "pip" # Automatically caches dependencies for faster subsequent runs

      # Step 3: Install all required backend packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      # Step 4: Change directory into backend and execute pytest
      - name: Run Pytest Suite
        run: |
          cd backend
          pytest
