name: Continuous Integration

# Trigger this workflow on pushes or Pull Requests to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest

    # Define service containers to spin up alongside the runner environment
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python on the virtual environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Automatically caches dependencies for faster subsequent runs

      # Step 3: Install all required backend packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      # Step 4: Change directory into backend and execute pytest
      - name: Run Pytest Suite
        env:
          # Tell FastAPI to connect to the runner's self-contained MongoDB service
          MONGODB_URL: mongodb://localhost:27017
          DATABASE_NAME: test_freelancer_db
        run: |
          cd backend
          pytest
